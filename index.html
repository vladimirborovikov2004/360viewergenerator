<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360° Viewer</title>
    <link rel="stylesheet" href="pannellum.css">
    <style>
        * { margin: 0; padding: 0; }
        html, body { height: 100vh; overflow: hidden; background: black; }
        #panorama { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="panorama"></div>
    <script src="pannellum.js"></script>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            
            let imageUrl = params.get('img');
            if (!imageUrl) {
                // Дефолтное изображение, если параметр не указан
                imageUrl = 'https://raw.githubusercontent.com/vladimirborovikov2004/360gls/main/rbadYft7az9NZvofpM1kS1AGtu2iTaWmW4EFKDgwtNygMRECKbPZsAQlnkWiPUrhcRnRqQl1tDKcXSjWpaXQQ__-_2_.jpg';
            }
            
            // Читаем углы и масштаб из параметров
            const yaw   = parseFloat(params.get('yaw'))   || -30;
            const pitch = parseFloat(params.get('pitch')) || -10;
            const hfov  = parseFloat(params.get('hfov'))  || 100;
            
            pannellum.viewer('panorama', {
                type: 'equirectangular',
                panorama: imageUrl,
                autoLoad: true,
                showControls: false,
                showZoomCtrl: false,
                mouseZoom: false,
                default: { yaw: yaw, pitch: pitch },
                hfov: hfov,
                minHfov: 30,
                maxHfov: 120,
                minPitch: -75,
                maxPitch: 90
            });
        })();
    </script>
</body>
</html>
